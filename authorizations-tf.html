<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>إدارة الصلاحيات - Turk Fashion</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<style>
:root{
  --gold:#c9a84c; --bg:#0f0f10; --surface:#1a1a1c; --surface2:#222224;
  --text:#f0f0f0; --text-muted:#9a9a9a; --border:#2e2e30; --danger:#e53935; --success:#43a047;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl;}

/* ====== شاشة الدخول ====== */
#login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
}
.login-box{
  width:100%;max-width:380px;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:32px 24px;text-align:center;
}
.login-box h1{font-size:1.3rem;font-weight:800;margin-bottom:4px;color:var(--gold);}
.login-box p{font-size:.8rem;color:var(--text-muted);margin-bottom:24px;}
.login-field{position:relative;margin-bottom:14px;}
.login-field input{
  width:100%;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);font-family:'Cairo',sans-serif;font-size:.9rem;border-radius:8px;
}
.login-field input[dir="ltr"]{text-align:left;}
.eye-toggle{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  cursor:pointer;color:var(--text-muted);font-size:.9rem;
}
.login-btn{
  width:100%;padding:13px;background:linear-gradient(135deg,var(--gold),#a8852f);
  color:#000;border:none;border-radius:8px;font-weight:800;font-size:.9rem;cursor:pointer;
  font-family:'Cairo',sans-serif;margin-top:6px;
}
.login-btn:active{opacity:.85;}
#login-error{color:var(--danger);font-size:.8rem;margin-top:10px;display:none;}

/* ====== لوحة الصلاحيات ====== */
#main-app{display:none;}
.top-bar{
  background:var(--surface);border-bottom:1px solid var(--border);padding:14px 18px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;
}
.top-bar .title{font-weight:800;font-size:1.05rem;}
.top-bar .title span{color:var(--gold);}
.logout-btn{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:7px 14px;border-radius:6px;font-size:.8rem;cursor:pointer;font-family:'Cairo',sans-serif;
}
.container{max-width:680px;margin:0 auto;padding:18px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:18px;}
.card-title{font-weight:800;color:var(--gold);font-size:1rem;margin-bottom:14px;}
.field{
  width:100%;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);font-family:'Cairo',sans-serif;font-size:.85rem;border-radius:6px;
  margin-bottom:10px;
}
.field[dir="ltr"]{text-align:left;}
.perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;}
.perm-grid label{
  display:flex;align-items:center;gap:6px;font-size:.8rem;background:var(--surface2);
  padding:8px 10px;border-radius:6px;cursor:pointer;
}
.btn-gold{
  background:linear-gradient(135deg,var(--gold),#a8852f);color:#000;border:none;
  padding:11px;border-radius:6px;font-weight:800;font-size:.85rem;cursor:pointer;
  width:100%;font-family:'Cairo',sans-serif;
}
#add-msg{font-size:.8rem;margin-bottom:8px;display:none;}
.search-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.search-row input{padding:7px 10px;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);font-family:'Cairo',sans-serif;font-size:.78rem;border-radius:6px;width:160px;}
.admin-item{background:var(--surface2);border-radius:8px;padding:12px;margin-bottom:10px;border:1px solid var(--border);}
.admin-item .row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;}
.admin-item .email{font-weight:700;font-size:.82rem;word-break:break-all;}
.del-btn{background:var(--danger);border:none;color:#fff;padding:4px 10px;border-radius:5px;
  font-size:.72rem;cursor:pointer;font-family:'Cairo',sans-serif;flex-shrink:0;}
.edit-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);
  padding:6px 12px;border-radius:5px;font-size:.76rem;cursor:pointer;font-family:'Cairo',sans-serif;width:100%;}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.tag{background:var(--gold);color:#000;padding:2px 7px;border-radius:3px;font-size:.7rem;font-weight:700;}
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#222;color:#fff;padding:11px 22px;border-radius:8px;font-size:.85rem;
  z-index:9999;display:none;box-shadow:0 4px 14px rgba(0,0,0,.4);
}
.back-link{display:inline-block;margin-bottom:14px;color:var(--text-muted);font-size:.8rem;text-decoration:none;}
.back-link:hover{color:var(--gold);}
</style>
</head>
<body>

<!-- ============ شاشة الدخول ============ -->
<div id="login-screen">
  <div class="login-box">
    <h1>إدارة الصلاحيات</h1>
    <p>Turk Fashion — دخول المدير الرئيسي فقط</p>
    <div class="login-field">
      <input type="email" id="login-email" dir="ltr" placeholder="البريد الإلكتروني" onkeydown="if(event.key==='Enter')document.getElementById('login-pass').focus()">
    </div>
    <div class="login-field">
      <input type="password" id="login-pass" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')doLogin()">
      <span class="eye-toggle" id="eye-icon" onclick="togglePwEye()"><i class="fas fa-eye"></i></span>
    </div>
    <button class="login-btn" onclick="doLogin()">دخول</button>
    <div id="login-error">❌ بيانات الدخول غير صحيحة، أو الحساب غير مُصرَّح له بالدخول لهذه الصفحة</div>
  </div>
</div>

<!-- ============ التطبيق الرئيسي ============ -->
<div id="main-app">
  <div class="top-bar">
    <div class="title"><span>Turk</span> Fashion — الصلاحيات</div>
    <button class="logout-btn" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
  </div>

  <div class="container">
    <a class="back-link" href="admin-tf.html"><i class="fas fa-arrow-right"></i> الذهاب للوحة التحكم</a>

    <!-- إضافة / تعديل حساب -->
    <div class="card">
      <div class="card-title">➕ إضافة حساب أدمن جديد</div>
      <input type="email" class="field" id="perm-new-email" dir="ltr" placeholder="البريد الإلكتروني">
      <input type="password" class="field" id="perm-new-pass" placeholder="كلمة المرور (6 أحرف على الأقل)">
      <div style="font-weight:700;margin-bottom:8px;font-size:.85rem;">الصلاحيات:</div>
      <div class="perm-grid" id="perm-checkboxes">
        <label><input type="checkbox" value="products"> إدارة المنتجات</label>
        <label><input type="checkbox" value="categories"> الأقسام</label>
        <label><input type="checkbox" value="slider"> البانر الرئيسي</label>
        <label><input type="checkbox" value="orders"> الطلبات</label>
        <label><input type="checkbox" value="coupons"> الكوبونات</label>
        <label><input type="checkbox" value="shipping"> مناطق الشحن</label>
        <label><input type="checkbox" value="site-settings"> إعدادات الموقع</label>
        <label><input type="checkbox" value="admin-marketing"> الرسائل التسويقية</label>
        <label><input type="checkbox" value="admin-sales-stats"> إحصائيات المبيعات</label>
        <label><input type="checkbox" value="admin-customers"> إدارة العملاء</label>
        <label><input type="checkbox" value="admin-reviews"> الريفيوهات</label>
        <label><input type="checkbox" value="returned-orders"> المرتجعات</label>
        <label><input type="checkbox" value="payment-settings"> إعدادات الدفع</label>
        <label><input type="checkbox" value="about-us"> من نحن</label>
      </div>
      <div id="add-msg"></div>
      <button class="btn-gold" onclick="addSubAdmin()"><i class="fas fa-user-plus"></i> حفظ الحساب</button>
    </div>

    <!-- قائمة الأدمنز -->
    <div class="card">
      <div class="search-row">
        <div class="card-title" style="margin:0;">👥 الحسابات الحالية</div>
        <input type="text" id="perm-filter" placeholder="🔍 بحث بالإيميل..." oninput="renderAdminsList()">
      </div>
      <div id="admins-list">
        <div style="text-align:center;color:var(--text-muted);font-size:.85rem;padding:20px;">جاري التحميل...</div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ==================== FIREBASE ====================
const firebaseConfig = {
  apiKey: "AIzaSyA6ACh8noBXJILzTEsXHfF0Whtmmi9c8E4",
  authDomain: "turk-fashion.firebaseapp.com",
  projectId: "turk-fashion",
  storageBucket: "turk-fashion.firebasestorage.app",
  messagingSenderId: "465210641717",
  appId: "1:465210641717:web:6d60b83758f73a801b507c"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

const MAIN_ADMIN_EMAIL = 'Turk.fashion2000@gmail.com';

// ==================== TOAST ====================
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(()=> t.style.display='none', 3000);
}

// ==================== تسجيل الدخول ====================
function togglePwEye(){
  const inp = document.getElementById('login-pass');
  const icon = document.getElementById('eye-icon').querySelector('i');
  if (inp.type === 'password'){ inp.type='text'; icon.className='fas fa-eye-slash'; }
  else { inp.type='password'; icon.className='fas fa-eye'; }
}

function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';

  if (!email || !pass) {
    errEl.style.display='block'; errEl.textContent = '⚠️ من فضلك أدخل البريد الإلكتروني وكلمة المرور';
    return;
  }

  auth.signInWithEmailAndPassword(email, pass)
    .then((cred) => {
      const signedEmail = cred.user.email.toLowerCase();
      if (signedEmail !== MAIN_ADMIN_EMAIL.toLowerCase()) {
        // هذه الصفحة للمدير الرئيسي فقط
        auth.signOut();
        errEl.style.display='block';
        errEl.textContent = '❌ هذه الصفحة مخصصة للمدير الرئيسي فقط';
        return;
      }
      showApp();
    })
    .catch(() => {
      errEl.style.display='block';
      errEl.textContent = '❌ بيانات الدخول غير صحيحة';
    });
}

function doLogout(){
  auth.signOut().then(()=>{
    document.getElementById('main-app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-email').value = '';
    document.getElementById('login-pass').value = '';
  });
}

function showApp(){
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  renderAdminsList();
}

// الإبقاء على الجلسة لو كان المدير مسجل دخول بالفعل (نفس متصفح الأدمن)
auth.onAuthStateChanged((user) => {
  if (user && user.email && user.email.toLowerCase() === MAIN_ADMIN_EMAIL.toLowerCase()) {
    showApp();
  }
});

// ==================== إدارة الصلاحيات ====================
async function addSubAdmin() {
  const email = document.getElementById('perm-new-email').value.trim().toLowerCase();
  const pass = document.getElementById('perm-new-pass').value;
  const msgEl = document.getElementById('add-msg');
  const checkboxes = document.querySelectorAll('#perm-checkboxes input[type=checkbox]:checked');
  const permissions = Array.from(checkboxes).map(c => c.value);

  if (!email || !pass) {
    msgEl.style.display = 'block'; msgEl.style.color = '#e53935';
    msgEl.textContent = '⚠️ أدخل البريد الإلكتروني وكلمة المرور';
    return;
  }
  if (pass.length < 6) {
    msgEl.style.display = 'block'; msgEl.style.color = '#e53935';
    msgEl.textContent = '⚠️ كلمة المرور يجب أن تكون 6 أحرف على الأقل';
    return;
  }
  if (permissions.length === 0) {
    msgEl.style.display = 'block'; msgEl.style.color = '#e53935';
    msgEl.textContent = '⚠️ اختر صلاحية واحدة على الأقل';
    return;
  }

  msgEl.style.display = 'block'; msgEl.style.color = '#c9a84c';
  msgEl.textContent = '⏳ جاري الإنشاء...';

  try {
    await db.collection('admins').doc(email).set({
      email,
      permissions,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      createdBy: auth.currentUser?.email || MAIN_ADMIN_EMAIL
    });

    const apiKey = 'AIzaSyA6ACh8noBXJILzTEsXHfF0Whtmmi9c8E4';
    const res = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass, returnSecureToken: false })
    });
    const data = await res.json();
    if (data.error) {
      if (data.error.message === 'EMAIL_EXISTS') {
        msgEl.style.color = '#43a047';
        msgEl.textContent = '✅ تم تحديث صلاحيات الحساب بنجاح';
      } else {
        throw new Error(data.error.message);
      }
    } else {
      msgEl.style.color = '#43a047';
      msgEl.textContent = '✅ تم إنشاء الحساب وحفظ الصلاحيات بنجاح - يمكنه الدخول مباشرةً من لوحة التحكم';
    }

    document.getElementById('perm-new-email').value = '';
    document.getElementById('perm-new-pass').value = '';
    document.querySelectorAll('#perm-checkboxes input[type=checkbox]').forEach(c => c.checked = false);
    renderAdminsList();
  } catch(e) {
    msgEl.style.color = '#e53935';
    msgEl.textContent = '❌ خطأ: ' + (e.message || 'حاول مرة أخرى');
  }
}

async function renderAdminsList() {
  const listEl = document.getElementById('admins-list');
  if (!listEl) return;
  const filter = (document.getElementById('perm-filter')?.value || '').toLowerCase();
  listEl.innerHTML = '<div style="text-align:center;color:var(--text-muted);font-size:.85rem;padding:20px;"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div>';
  try {
    const snap = await db.collection('admins').get();
    let admins = snap.docs.map(d => d.data());
    if (filter) admins = admins.filter(a => a.email?.includes(filter));
    if (!admins.length) {
      listEl.innerHTML = '<div style="text-align:center;color:var(--text-muted);font-size:.85rem;padding:20px;">لا توجد حسابات بعد</div>';
      return;
    }
    const permLabels = {
      'products':'المنتجات','categories':'الأقسام','slider':'البانر',
      'orders':'الطلبات','coupons':'الكوبونات','shipping':'الشحن',
      'site-settings':'إعدادات الموقع','admin-marketing':'التسويق',
      'admin-sales-stats':'الإحصائيات','admin-customers':'العملاء',
      'admin-reviews':'الريفيوهات','returned-orders':'المرتجعات',
      'payment-settings':'الدفع','about-us':'من نحن'
    };
    listEl.innerHTML = admins.map(a => `
      <div class="admin-item">
        <div class="row">
          <div class="email">${a.email}</div>
          <button class="del-btn" onclick="deleteSubAdmin('${a.email}')"><i class="fas fa-trash"></i> حذف</button>
        </div>
        <div class="tags">
          ${(a.permissions||[]).map(p => `<span class="tag">✓ ${permLabels[p]||p}</span>`).join('')}
        </div>
        <button class="edit-btn" onclick='editSubAdmin("${a.email}", ${JSON.stringify(a.permissions||[])})'>
          <i class="fas fa-edit"></i> تعديل الصلاحيات
        </button>
      </div>
    `).join('');
  } catch(e) {
    listEl.innerHTML = '<div style="color:#e53935;font-size:.85rem;padding:10px;">❌ خطأ في التحميل: ' + e.message + '</div>';
  }
}

async function deleteSubAdmin(email) {
  if (!confirm(`هل أنت متأكد من حذف حساب ${email}؟`)) return;
  try {
    await db.collection('admins').doc(email).delete();
    showToast('✅ تم حذف الحساب من قائمة الأدمنز');
    renderAdminsList();
  } catch(e) {
    showToast('❌ خطأ: ' + e.message);
  }
}

function editSubAdmin(email, permissions) {
  document.getElementById('perm-new-email').value = email;
  document.getElementById('perm-new-pass').value = '';
  const permsArr = Array.isArray(permissions) ? permissions : [];
  document.querySelectorAll('#perm-checkboxes input[type=checkbox]').forEach(cb => {
    cb.checked = permsArr.includes(cb.value);
  });
  const msgEl = document.getElementById('add-msg');
  msgEl.style.display = 'block'; msgEl.style.color = '#c9a84c';
  msgEl.textContent = '⚠️ وضع التعديل - اترك كلمة المرور فارغة للإبقاء عليها، أو أدخل كلمة مرور جديدة';
  window.scrollTo({top:0, behavior:'smooth'});
}
</script>
</body>
</html>
